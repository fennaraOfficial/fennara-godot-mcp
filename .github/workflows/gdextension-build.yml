name: GDExtension Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "fennara-cpp/**"
      - "godot/addons/fennara/**"
      - ".github/workflows/gdextension-build.yml"
  push:
    branches:
      - main
    paths:
      - "fennara-cpp/**"
      - "godot/addons/fennara/**"
      - ".github/workflows/gdextension-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gdextension-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check source layout
        id: source
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "fennara-cpp/SConstruct" && -d "fennara-cpp/godot-cpp" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::notice::fennara-cpp source is not present yet; skipping GDExtension build."

      - name: Set up Python
        if: steps.source.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        if: steps.source.outputs.available == 'true'
        run: pip install scons

      - name: Install Linux build dependencies
        if: steps.source.outputs.available == 'true' && matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Cache SCons and godot-cpp outputs
        if: steps.source.outputs.available == 'true'
        uses: actions/cache@v4
        with:
          path: |
            fennara-cpp/.scons_cache/
            fennara-cpp/.sconsign.dblite
            fennara-cpp/godot-cpp/bin/
            fennara-cpp/godot-cpp/gen/
          key: godot-cpp-${{ runner.os }}-${{ matrix.platform }}-editor-${{ hashFiles('fennara-cpp/godot-cpp/SConstruct', 'fennara-cpp/godot-cpp/tools/**/*.py', 'fennara-cpp/godot-cpp/include/**/*.h', 'fennara-cpp/godot-cpp/include/**/*.hpp', 'fennara-cpp/godot-cpp/gdextension/*.json') }}
          restore-keys: |
            godot-cpp-${{ runner.os }}-${{ matrix.platform }}-editor-
            godot-cpp-${{ runner.os }}-${{ matrix.platform }}-

      - name: Build GDExtension
        if: steps.source.outputs.available == 'true'
        working-directory: fennara-cpp
        env:
          SCONS_CACHE: ${{ github.workspace }}/fennara-cpp/.scons_cache
        run: scons platform=${{ matrix.platform }} target=editor
