name: Package Preview

on:
  workflow_dispatch:
    inputs:
      linux_cef_runtime_url:
        description: "Optional CEF tarball or prebuilt Fennara CEF runtime zip URL. Blank downloads the pinned official CEF 139 Linux minimal archive."
        required: false
        default: ""
        type: string
      linux_cef_runtime_name:
        description: "Optional output file name when linux_cef_runtime_url points to a prebuilt Fennara CEF runtime zip."
        required: false
        default: ""
        type: string
      linux_cef_runtime_sha256:
        description: "Optional SHA-256 for the downloaded CEF tarball or prebuilt runtime zip."
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: package-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x86_64
            os: windows-latest
          - platform: linux
            arch: x86_64
            os: ubuntu-latest
          - platform: macos
            arch: arm64
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: pip install scons

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential bzip2 pkg-config ripgrep

      - name: Install Windows ripgrep
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Install macOS ripgrep
        if: matrix.platform == 'macos'
        run: brew install ripgrep

      - name: Prepare Linux CEF SDK
        if: matrix.platform == 'linux'
        id: linux_cef_sdk
        run: |
          node scripts/prepare-linux-cef-sdk.mjs \
            --out-dir "${RUNNER_TEMP}/fennara-cef-sdk" \
            --download-dir "${RUNNER_TEMP}/fennara-cef-download"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute godot-cpp cache key
        id: godot_cpp_cache_key
        shell: bash
        run: |
          set -euo pipefail
          source_hash="${{ hashFiles('fennara-cpp/godot-cpp/SConstruct', 'fennara-cpp/godot-cpp/tools/**/*.py', 'fennara-cpp/godot-cpp/include/**/*.h', 'fennara-cpp/godot-cpp/include/**/*.hpp', 'fennara-cpp/godot-cpp/gdextension/*.json') }}"
          image_id="${ImageOS:-${RUNNER_OS:-unknown}}-${ImageVersion:-unknown}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            toolchain_id="$(powershell -NoProfile -Command '$vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"; if (Test-Path $vswhere) { $install = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; if ($install) { $versions = Get-ChildItem (Join-Path $install "VC\Tools\MSVC") -Directory | Sort-Object Name -Descending; if ($versions) { $versions[0].Name } } }' | tr -d '\r')"
          else
            toolchain_id="$(c++ --version | head -n 1)"
          fi
          toolchain_id="$(printf "%s" "${toolchain_id:-unknown}" | tr -c 'A-Za-z0-9_.-' '-')"
          base="godot-cpp-v2-${{ runner.os }}-${{ matrix.platform }}-editor-${source_hash}-${image_id}-${toolchain_id}"
          echo "primary=${base}-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
          echo "restore=${base}-" >> "$GITHUB_OUTPUT"
          echo "image-id=${image_id}" >> "$GITHUB_OUTPUT"
          echo "toolchain-id=${toolchain_id}" >> "$GITHUB_OUTPUT"

      - name: Cache SCons and godot-cpp outputs
        id: godot_cpp_cache
        uses: actions/cache@v4
        with:
          path: |
            fennara-cpp/.scons_cache/
            fennara-cpp/.sconsign.dblite
            fennara-cpp/godot-cpp/bin/
            fennara-cpp/godot-cpp/gen/
            fennara-cpp/godot-cpp/src/**/*.obj
            fennara-cpp/godot-cpp/src/**/*.pdb
          key: ${{ steps.godot_cpp_cache_key.outputs.primary }}
          restore-keys: |
            ${{ steps.godot_cpp_cache_key.outputs.restore }}

      - name: Report godot-cpp cache
        run: |
          echo "cache-hit: ${{ steps.godot_cpp_cache.outputs.cache-hit }}"
          echo "cache-primary-key: ${{ steps.godot_cpp_cache_key.outputs.primary }}"
          echo "cache-restore-prefix: ${{ steps.godot_cpp_cache_key.outputs.restore }}"
          echo "runner-image: ${{ steps.godot_cpp_cache_key.outputs.image-id }}"
          echo "toolchain-id: ${{ steps.godot_cpp_cache_key.outputs.toolchain-id }}"

      - name: Cache Cargo artifacts
        id: cargo_cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            local/target
          key: local-cargo-${{ runner.os }}-${{ hashFiles('local/Cargo.lock') }}
          restore-keys: |
            local-cargo-${{ runner.os }}-

      - name: Report Cargo cache
        run: |
          echo "cache-hit: ${{ steps.cargo_cache.outputs.cache-hit }}"
          echo "cache-primary-key: local-cargo-${{ runner.os }}-${{ hashFiles('local/Cargo.lock') }}"

      - name: Build GDExtension
        working-directory: fennara-cpp
        env:
          SCONS_CACHE: ${{ github.workspace }}/fennara-cpp/.scons_cache
          FENNARA_CEF_ROOT: ${{ steps.linux_cef_sdk.outputs.cef_root }}
        run: scons platform=${{ matrix.platform }} target=editor --debug=explain --cache-show

      - name: Build local tools
        working-directory: local
        run: cargo build --release --locked

      - name: Assemble preview archives
        run: node scripts/package-preview.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload preview archives
        uses: actions/upload-artifact@v4
        with:
          name: fennara-package-preview-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Build Linux CEF runtime preview asset
        if: matrix.platform == 'linux'
        shell: bash
        env:
          LINUX_CEF_RUNTIME_URL: ${{ inputs.linux_cef_runtime_url }}
          LINUX_CEF_RUNTIME_NAME: ${{ inputs.linux_cef_runtime_name }}
          LINUX_CEF_RUNTIME_SHA256: ${{ inputs.linux_cef_runtime_sha256 }}
        run: |
          set -euo pipefail

          mkdir -p .package-preview/cef-download .package-preview/cef-source dist/linux-cef-runtime-preview

          download_url="${LINUX_CEF_RUNTIME_URL}"
          download_name=""
          cef_version=""

          if [[ -z "${download_url}" ]]; then
            cef_version="139.0.28+g55ab8a8+chromium-139.0.7258.139"
            node scripts/prepare-linux-cef-runtime.mjs \
              --cef-root "${{ steps.linux_cef_sdk.outputs.cef_root }}" \
              --version "${cef_version}" \
              --out-dir dist/linux-cef-runtime-preview
            exit 0
          else
            url_path="${download_url%%\?*}"
            download_name="$(basename "${url_path}")"
            download_name="${download_name//%2B/+}"
            download_name="${download_name//%2b/+}"
          fi

          if [[ -z "${download_name}" || "${download_name}" == "." || "${download_name}" == "/" || "${download_name}" == *"/"* || "${download_name}" == *"\\"* ]]; then
            echo "::error::linux_cef_runtime_url must end with a file name when provided."
            exit 1
          fi

          download_path=".package-preview/cef-download/${download_name}"
          curl --location --fail --show-error --retry 3 --output "${download_path}" "${download_url}"

          if [[ -n "${LINUX_CEF_RUNTIME_SHA256}" ]]; then
            actual_sha256="$(sha256sum "${download_path}" | awk '{print $1}')"
            if [[ "${actual_sha256,,}" != "${LINUX_CEF_RUNTIME_SHA256,,}" ]]; then
              echo "::error::Linux CEF download sha256 mismatch: expected ${LINUX_CEF_RUNTIME_SHA256}, got ${actual_sha256}."
              exit 1
            fi
          fi

          if [[ "${download_name}" =~ ^fennara-webview-cef-linux-x64-.+\.zip$ ]]; then
            asset_name="${LINUX_CEF_RUNTIME_NAME:-${download_name}}"
            if [[ "${asset_name}" != "${download_name}" && ! "${asset_name}" =~ ^fennara-webview-cef-linux-x64-.+\.zip$ ]]; then
              echo "::error::linux_cef_runtime_name must match fennara-webview-cef-linux-x64-<version>.zip."
              exit 1
            fi
            cp "${download_path}" "dist/linux-cef-runtime-preview/${asset_name}"
            echo "Uploaded prebuilt Linux CEF runtime preview asset: ${asset_name}"
            exit 0
          fi

          if [[ ! "${download_name}" =~ ^cef_binary_(.+)_linux64(_minimal)?\.tar\.bz2$ ]]; then
            echo "::error::Linux CEF input must be an official cef_binary_<version>_linux64[_minimal].tar.bz2 or fennara-webview-cef-linux-x64-<version>.zip."
            exit 1
          fi

          if [[ -z "${cef_version}" ]]; then
            cef_version="${BASH_REMATCH[1]}"
          fi

          tar -xjf "${download_path}" -C .package-preview/cef-source
          cef_root="$(find .package-preview/cef-source -maxdepth 1 -type d \( -name 'cef_binary_*_linux64' -o -name 'cef_binary_*_linux64_minimal' \) | head -n 1)"
          if [[ -z "${cef_root}" ]]; then
            echo "::error::Could not find extracted cef_binary_*_linux64 or cef_binary_*_linux64_minimal directory."
            exit 1
          fi

          node scripts/prepare-linux-cef-runtime.mjs \
            --cef-root "${cef_root}" \
            --version "${cef_version}" \
            --out-dir dist/linux-cef-runtime-preview

      - name: Upload Linux CEF runtime preview asset
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: fennara-package-preview-linux-cef-runtime
          path: dist/linux-cef-runtime-preview/*.zip
          if-no-files-found: error

      - name: Upload addon part
        uses: actions/upload-artifact@v4
        with:
          name: fennara-addon-part-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/addon-part-${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error

  addon:
    name: package all-platform addon
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download addon parts
        uses: actions/download-artifact@v4
        with:
          path: addon-parts
          pattern: fennara-addon-part-*
          merge-multiple: true

      - name: Assemble all-platform addon archive
        run: node scripts/package-addon-all.mjs --parts-dir addon-parts

      - name: Upload all-platform addon archive
        uses: actions/upload-artifact@v4
        with:
          name: fennara-package-preview-addon
          path: dist/fennara-addon-*.zip
          if-no-files-found: error
