name: PR Size

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]

permissions:
  issues: write
  pull-requests: read

concurrency:
  group: pr-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label PR size
    runs-on: ubuntu-24.04
    steps:
      - name: Sync PR size label
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.pull_request.number;
            const managedLabels = [
              {
                name: "size:XS",
                color: "0e8a16",
                description: "0-9 changed lines.",
                maxExclusive: 10,
              },
              {
                name: "size:S",
                color: "5ebd3e",
                description: "10-29 changed lines.",
                maxExclusive: 30,
              },
              {
                name: "size:M",
                color: "fbca04",
                description: "30-99 changed lines.",
                maxExclusive: 100,
              },
              {
                name: "size:L",
                color: "fe7d37",
                description: "100-499 changed lines.",
                maxExclusive: 500,
              },
              {
                name: "size:XL",
                color: "d93f0b",
                description: "500-999 changed lines.",
                maxExclusive: 1000,
              },
              {
                name: "size:XXL",
                color: "b60205",
                description: "1,000+ changed lines.",
                maxExclusive: Number.POSITIVE_INFINITY,
              },
            ];

            const managedLabelNames = new Set(managedLabels.map((label) => label.name));

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (
                  existing.color !== label.color ||
                  (existing.description ?? "") !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              }
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber,
              per_page: 100,
            });

            const changedLines = files.reduce(
              (total, file) => total + file.additions + file.deletions,
              0,
            );
            const nextLabel = managedLabels.find(
              (label) => changedLines < label.maxExclusive,
            ).name;

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            for (const label of currentLabels) {
              if (!managedLabelNames.has(label.name) || label.name === nextLabel) {
                continue;
              }

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (!currentLabels.some((label) => label.name === nextLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [nextLabel],
              });
            }

            core.info(`PR #${issueNumber}: ${changedLines} changed lines -> ${nextLabel}`);
